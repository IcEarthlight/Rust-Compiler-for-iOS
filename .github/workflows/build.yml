name: iOS Native Rust Toolchain

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: Rust version
        default: stable

env:
  IOS_MIN_VER: "15.0"
  TARGET: "aarch64-apple-ios"

jobs:
  full-bootstrap:
    runs-on: macos-latest
    timeout-minutes: 480
    strategy:
      fail-fast: false

    steps:
      - name: 系统环境快照
        run: |
          sw_vers
          uname -a
          df -h / || true
          xcode-select -p 2>/dev/null || echo "CLT unset"
          xcrun --show-sdk-version 2>/dev/null || echo "xcrun unavailable"
          for cmd in clang ld cmake ninja curl wget; do
            printf "%s: " "$cmd"
            command -v "$cmd" 2>/dev/null && printf "installed\n" || printf "missing\n"
          done

      - name: 安装 Xcode CLT
        run: |
          if xcode-select -p &>/dev/null; then
            echo "CLT already installed"
            exit 0
          fi
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          touch /tmp/.com.apple.dt.CommandLineTools.installondemand.in-progress
          softwareupdate -l 2>/dev/null | grep "Command Line" | head -1 | awk -F'*' '{print $2}' | sed 's/^ *//' | xargs -I{} softwareupdate -i "{}" 2>/dev/null || xcode-select --install 2>/dev/null || true
          for i in $(seq 1 120); do
            if xcode-select -p &>/dev/null; then break; fi
            sleep 5
          done

      - name: 安装依赖
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          for pkg in cmake ninja zstd curl openssl@3 libffi xz llvm wget binutils ldid; do
            brew list --versions "$pkg" &>/dev/null && echo "OK: $pkg" && continue
            for attempt in 1 2 3; do
              brew install "$pkg" 2>/dev/null && break
              sleep 15
            done
            brew list --versions "$pkg" &>/dev/null && echo "Done: $pkg" || echo "FAIL: $pkg"
          done

      - name: 获取 iOS SDK
        id: sdk
        run: |
          fetch_sdk() {
            local sdk
            sdk=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
            [ -d "$sdk" ] && { echo "$sdk"; return 0; }
            sdk=$(find /Applications/Xcode.app -name "iPhoneOS.sdk" -type d 2>/dev/null | head -1)
            [ -d "$sdk" ] && { echo "$sdk"; return 0; }
            for url in \
              "https://github.com/theos/sdks/archive/refs/heads/master.zip" \
              "https://github.com/xybp888/iOS-SDKs/archive/refs/heads/master.zip"; do
              curl -L --retry 3 --retry-delay 30 -o /tmp/sdks.zip "$url" 2>/dev/null || continue
              unzip -qo /tmp/sdks.zip -d /tmp/sdks_tmp 2>/dev/null || continue
              sdk=$(find /tmp/sdks_tmp -name "iPhoneOS*.sdk" -type d 2>/dev/null | sort -Vr | head -1)
              [ -d "$sdk" ] && [ -f "$sdk/SDKSettings.plist" ] && { echo "$sdk"; return 0; }
            done
            xcodebuild -downloadPlatform iOS 2>/dev/null || true
            sdk=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
            [ -d "$sdk" ] && { echo "$sdk"; return 0; }
            local stub="/tmp/min_ios_sdk"
            mkdir -p "$stub/usr/include" "$stub/usr/lib" "$stub/System/Library/Frameworks"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict><key>CanonicalName</key><string>iphoneos</string></dict></plist>\n' > "$stub/SDKSettings.plist"
            echo "$stub"
            return 0
          }
          SDK=$(fetch_sdk)
          echo "SDK_PATH=$SDK" >> $GITHUB_ENV
          echo "SDK: $SDK"
          ls "$SDK/usr/include" 2>/dev/null | head -5 || echo "No headers"

      - name: 安装 Rust 工具链
        run: |
          if command -v rustup &>/dev/null; then
            echo "rustup already installed"
          else
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add "$TARGET" 2>/dev/null || true
          rustc --version
          cargo --version

      - name: 生成交叉编译 Wrapper
        run: |
          TOOL_DIR="$HOME/ios-tools"
          mkdir -p "$TOOL_DIR"

          printf '#!/bin/bash\nSDK="${IOS_SDK_PATH:-/tmp/min_ios_sdk}"\nMIN_VER="${IOS_MIN_VER:-15.0}"\nexec clang -arch arm64 -isysroot "$SDK" -mios-version-min="$MIN_VER" "$@"\n' > "$TOOL_DIR/ios-clang"
          chmod +x "$TOOL_DIR/ios-clang"

          printf '#!/bin/bash\nSDK="${IOS_SDK_PATH:-/tmp/min_ios_sdk}"\nMIN_VER="${IOS_MIN_VER:-15.0}"\nexec clang++ -arch arm64 -isysroot "$SDK" -mios-version-min="$MIN_VER" -stdlib=libc++ "$@"\n' > "$TOOL_DIR/ios-clang++"
          chmod +x "$TOOL_DIR/ios-clang++"

          cat > "$TOOL_DIR/ios-ld" << 'LDEOF'
          #!/bin/bash
          SDK="${IOS_SDK_PATH:-/tmp/min_ios_sdk}"
          MIN_VER="${IOS_MIN_VER:-15.0}"
          NEW_ARGS=()
          skip_next=false
          for arg in "$@"; do
              if $skip_next; then skip_next=false; continue; fi
              case "$arg" in
                  -platform_version) skip_next=true;;  # skip -platform_version ios 10.0.0 10.0.0
                  -syslibroot)       skip_next=true;;  # skip -syslibroot /path/to/sdk
                  -install_name)     NEW_ARGS+=("-Wl,-install_name");;  # translate to clang-compatible
                  -dylib)            NEW_ARGS+=("-dynamiclib");;       # translate to clang-compatible
                  *)                 NEW_ARGS+=("$arg");;
              esac
          done
          exec clang -arch arm64 -isysroot "$SDK" -mios-version-min="$MIN_VER" -Wl,-dead_strip "${NEW_ARGS[@]}"
          LDEOF
          chmod +x "$TOOL_DIR/ios-ld"

          # 验证
          printf 'int main(){return 0;}\n' > /tmp/test_wrap.c
          for wrap in ios-clang ios-clang++; do
            printf "Test %s: " "$wrap"
            SDK="$SDK_PATH" "$TOOL_DIR/$wrap" /tmp/test_wrap.c -o /tmp/test_wrap_out 2>&1 && {
              file /tmp/test_wrap_out | grep -q "arm64" && printf "OK\n" || printf "Not arm64\n"
            } || printf "FAIL\n"
          done
          echo "TOOL_DIR=$TOOL_DIR" >> $GITHUB_ENV

      - name: 检出 Rust 源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}
          submodules: recursive
          fetch-depth: 0

      - name: 修复 Git 完整性
        run: |
          git fetch --unshallow 2>/dev/null || true
          git submodule update --init --recursive --depth 1 2>/dev/null || git submodule update --init --recursive 2>/dev/null || true

      - name: 构建前检查
        run: |
          echo "SDK: $SDK_PATH"
          echo "Wrapper: $TOOL_DIR"
          echo "Clang: $(command -v clang)"
          RAM_GB=$(sysctl hw.memsize 2>/dev/null | awk '{printf "%.0f", $2/1024/1024/1024}')
          CPU=$(sysctl hw.ncpu 2>/dev/null | awk '{print $2}')
          if [ "$RAM_GB" -lt 8 ]; then JOBS=2
          elif [ "$RAM_GB" -lt 16 ]; then JOBS=$((CPU / 2))
          else JOBS=$CPU
          fi
          JOBS=$((JOBS < 1 ? 1 : JOBS))
          echo "Jobs: $JOBS"
          echo "BUILD_JOBS=$JOBS" >> $GITHUB_ENV

      - name: 生成 config.toml
        run: |
          ARCH=$(uname -m)
          [ "$ARCH" = "arm64" ] && BUILD_TRIPLE="aarch64-apple-darwin" || BUILD_TRIPLE="x86_64-apple-darwin"
          export BUILD_TRIPLE

          python3 -c "
          import os
          cfg = f'''[build]
          build = \"{os.environ['BUILD_TRIPLE']}\"
          host = [\"{os.environ['TARGET']}\"]
          target = [\"{os.environ['TARGET']}\"]
          tools = [\"cargo\", \"rustc\", \"rustdoc\", \"clippy\"]
          docs = false
          vendor = false

          [target.{os.environ['TARGET']}]
          cc = \"{os.environ['TOOL_DIR']}/ios-clang\"
          cxx = \"{os.environ['TOOL_DIR']}/ios-clang++\"
          linker = \"{os.environ['TOOL_DIR']}/ios-ld\"
          ar = \"ar\"
          ranlib = \"ranlib\"

          [rust]
          debug = false
          debug-assertions = false
          jemalloc = false
          lto = \"off\"
          codegen-units = 1
          incremental = false
          backtrace = true
          deny-warnings = false

          [llvm]
          static-libstdcpp = false
          link-shared = false
          ninja = true
          '''
          with open('config.toml', 'w') as f:
              f.write(cfg)
          "
          echo "=== config.toml ==="
          cat config.toml

      - name: 编译 Stage1 + Stage2
        timeout-minutes: 360
        run: |
          source "$HOME/.cargo/env"
          export PATH="$TOOL_DIR:$PATH"

          compile_stage() {
            local STAGE=$1
            local ATTEMPT=0
            local MAX_ATTEMPTS=5
            local LOG="/tmp/stage${STAGE}.log"

            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              printf "\n==========================================\n"
              printf "  Stage%s attempt %s/%s\n" "$STAGE" "$ATTEMPT" "$MAX_ATTEMPTS"
              printf "==========================================\n"

              (
                while true; do
                  FREE_MEM=$(vm_stat 2>/dev/null | awk '/free/ {print $3}' | sed 's/\.//')
                  [ -n "$FREE_MEM" ] && [ "$FREE_MEM" -lt 500 ] && echo "Low memory" >> /tmp/mem_warn.log
                  sleep 30
                done
              ) &
              MEM_MON_PID=$!

              set +e
              ./x build --stage "$STAGE" -j"${BUILD_JOBS:-4}" 2>&1 | tee "$LOG"
              RC=$?
              set -e

              kill $MEM_MON_PID 2>/dev/null || true

              if [ $RC -eq 0 ]; then
                printf "Stage%s success (attempt %s)\n" "$STAGE" "$ATTEMPT"
                return 0
              fi

              printf "Stage%s failed (exit %s)\n" "$STAGE" "$RC"
              tail -50 "$LOG" | grep -iE "error|fatal|fail|undefined|signal|linker|killed" | tail -10

              if grep -qiE "linker.*not found|ld.*command not found" "$LOG"; then
                printf '#!/bin/bash\nSDK="${IOS_SDK_PATH:-/tmp/min_ios_sdk}"\nexec clang -arch arm64 -isysroot "$SDK" -mios-version-min=15.0 -Wl,-undefined,dynamic_lookup "$@"\n' > "$TOOL_DIR/ios-ld"
                chmod +x "$TOOL_DIR/ios-ld"
                echo "Fixed linker wrapper"
              elif grep -qiE "signal: 9|killed" "$LOG"; then
                BUILD_JOBS=$((BUILD_JOBS / 2))
                [ "$BUILD_JOBS" -lt 1 ] && BUILD_JOBS=1
                echo "Reduced jobs to $BUILD_JOBS"
              elif grep -qiE "fatal error.*stdio|fatal error.*stdlib" "$LOG"; then
                for header in stdio.h stdlib.h string.h; do
                  [ ! -f "$SDK_PATH/usr/include/$header" ] && printf '/* stub */\n' > "$SDK_PATH/usr/include/$header"
                done
                echo "Stubbed missing headers"
              elif grep -qiE "could not compile|error\[E" "$LOG"; then
                ./x clean 2>/dev/null || true
                cargo clean 2>/dev/null || true
                echo "Cleaned build artifacts"
              else
                ./x clean 2>/dev/null || true
                BUILD_JOBS=$((BUILD_JOBS > 2 ? BUILD_JOBS - 1 : 1))
                echo "Generic retry, jobs: $BUILD_JOBS"
              fi
              sleep 5
            done
            printf "Stage%s failed after %s attempts\n" "$STAGE" "$MAX_ATTEMPTS"
            return 1
          }

          printf "\n==========================================\n"
          printf "  Stage1 compile\n"
          printf "==========================================\n"
          STAGE1_OK=false
          compile_stage 1 && STAGE1_OK=true

          if [ "$STAGE1_OK" = "true" ]; then
            printf "\n==========================================\n"
            printf "  Stage2 compile (iOS native)\n"
            printf "==========================================\n"
            compile_stage 2 || {
              echo "Stage2 failed, fallback to Stage1"
              echo "STAGE2_FAILED=1" >> $GITHUB_ENV
            }
          else
            echo "Stage1 failed"
            echo "STAGE1_FAILED=1" >> $GITHUB_ENV
          fi

          echo "=== Products ==="
          find build -name "rustc" -type f 2>/dev/null | while read f; do
            echo "--- $f ---"
            file "$f" 2>/dev/null
          done

      - name: 打包产物
        if: always()
        run: |
          source "$HOME/.cargo/env"

          if [ "$STAGE1_FAILED" = "1" ]; then
            mkdir -p build/dist/bin
            find build -name "rustc" -type f -exec cp {} build/dist/bin/ \; 2>/dev/null || true
          elif [ "$STAGE2_FAILED" = "1" ]; then
            ./x dist --stage 1 2>&1 || {
              mkdir -p build/dist/bin build/dist/lib
              cp -r build/host/stage1/bin/* build/dist/bin/ 2>/dev/null || true
            }
          else
            ./x dist --stage 2 2>&1 || {
              mkdir -p build/dist/bin build/dist/lib
              cp -r build/host/stage2/bin/* build/dist/bin/ 2>/dev/null || true
            }
          fi

          find build/dist -type f 2>/dev/null | while read f; do
            TYPE=$(file "$f" 2>/dev/null)
            echo "$f"
            echo "  $TYPE"
            if echo "$TYPE" | grep -q "Mach-O"; then
              otool -L "$f" 2>/dev/null | head -5 | sed 's/^/    /'
            fi
          done

          tar -czf rust-ios-toolchain.tar.gz -C build/dist . 2>/dev/null || tar -czf rust-ios-toolchain.tar.gz --files-from /dev/null
          ls -lh rust-ios-toolchain.tar.gz

      - name: 上传 Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-toolchain-${{ github.run_id }}
          path: rust-ios-toolchain.tar.gz
          retention-days: 14

      - name: 构建诊断报告
        if: always()
        run: |
          printf "==========================================\n"
          printf "  Build Report\n"
          printf "==========================================\n"
          printf "Stage1: %s\n" "${STAGE1_OK:-not run}"
          printf "Stage2: %s\n" "$([ "$STAGE2_FAILED" = "1" ] && printf 'failed (fallback)' || printf 'ok/not run')"
          printf "SDK: %s\n" "$SDK_PATH"
          printf "Jobs: %s\n" "${BUILD_JOBS:-4}"

          printf "\n=== Errors ===\n"
          for log in /tmp/stage*.log; do
            [ -f "$log" ] || continue
            printf "--- %s ---\n" "$log"
            grep -iE "error|fatal|fail|warning:" "$log" 2>/dev/null | tail -20 || echo "No errors"
          done

          if [ -f /tmp/mem_warn.log ]; then
            printf "\n=== Memory Warnings ===\n"
            cat /tmp/mem_warn.log
          fi
