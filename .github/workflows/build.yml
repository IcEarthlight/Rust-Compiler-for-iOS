name: 自举编译 Rust for iOS 交叉开发（macOS ARM64 宿主）

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: 'Rust 版本（如 stable 或 1.85.0）'
        required: true
        default: 'stable'

jobs:
  bootstrap:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ==================== 1. 环境准备 ====================
      - name: 修复 Xcode Command Line Tools
        run: |
          echo "=== 重新安装 Xcode CLT ==="
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          softwareupdate --list 2>/dev/null | grep "\*.*Command Line" | head -n1 | awk -F'*' '{print $2}' | sed 's/^ *//' | xargs -I{} softwareupdate -i "{}" 2>/dev/null || true
          xcode-select --install 2>/dev/null || true
          for i in $(seq 1 30); do
            if xcode-select -p &>/dev/null; then
              echo "CLT 就绪"
              break
            fi
            echo "等待 CLT 安装... ($i/30)"
            sleep 10
          done
          xcode-select -p
          echo "=== CLT 版本 ==="
          pkgutil --pkg-info=com.apple.pkg.CLTools_Executables 2>/dev/null || true

      - name: 安装全部构建依赖
        run: |
          echo "=== 安装 Homebrew 包 ==="
          brew install \
            cmake \
            ninja \
            ldid \
            zstd \
            curl \
            openssl@3 \
            libffi \
            xz \
            2>/dev/null || true

          echo "=== 设置 pkg-config 路径 ==="
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

          echo "=== 安装 Rustup ==="
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustc --version
          cargo --version

      # ==================== 2. 拉取 Rust 源码 ====================
      - name: 检出 Rust 官方源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}
          submodules: recursive
          fetch-depth: 1

      # ==================== 3. 环境诊断 ====================
      - name: 编译环境完整诊断
        run: |
          echo "=== Runner 架构 ==="
          uname -m
          echo "=== macOS 版本 ==="
          sw_vers
          echo "=== SDK 路径 ==="
          xcrun --show-sdk-path 2>/dev/null || echo "无 SDK"
          echo "=== cc 位置与版本 ==="
          which cc
          cc --version 2>&1 | head -n1
          echo "=== c++ 位置与版本 ==="
          which c++
          c++ --version 2>&1 | head -n1
          echo "=== ld 位置与版本 ==="
          which ld
          ld -v 2>&1 | head -n1 || true
          echo "=== cmake ==="
          cmake --version 2>&1 | head -n1
          echo "=== ninja ==="
          ninja --version 2>&1
          echo "=== python3 ==="
          python3 --version 2>&1
          echo "=== Homebrew 路径 ==="
          brew --prefix
          echo "=== PATH ==="
          echo $PATH
          echo "=== pkg-config 可用库 ==="
          pkg-config --list-all 2>/dev/null | grep -E "(ssl|crypto|libcurl|libz|zstd|ffi|lzma)" || true
          echo "=== 可用内存 ==="
          vm_stat | head -n5
          echo "=== 磁盘空间 ==="
          df -h / | tail -n1

      # ==================== 4. 配置构建参数 ====================
      - name: 创建 config.toml
        run: |
          cat > config.toml << 'EOF'
          [build]
          # Runner 是 Apple Silicon，产物也在 macOS 上运行
          build = "aarch64-apple-darwin"
          host = ["aarch64-apple-darwin"]
          target = ["aarch64-apple-ios"]
          tools = ["cargo", "rustdoc", "clippy"]

          [rust]
          incremental = false
          debug = false
          debug-assertions = false
          optimize = true
          codegen-units = 1
          codegen-units-std = 1

          [llvm]
          targets = "AArch64"
          download-ci-llvm = false
          link-jobs = 4
          ninja = true
          EOF

          echo "=== config.toml 内容 ==="
          cat config.toml

      # ==================== 5. 自举编译 ====================
      - name: 执行 Stage 2 自举编译
        run: |
          source $HOME/.cargo/env

          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          export OPENSSL_ROOT_DIR="/opt/homebrew/opt/openssl@3"

          echo "=== 验证关键工具 ==="
          which cmake && cmake --version 2>&1 | head -n1
          which ninja && ninja --version 2>&1
          which cc && cc --version 2>&1 | head -n1
          which ld && ld -v 2>&1 | head -n1

          export TMPDIR="$GITHUB_WORKSPACE/tmp"
          mkdir -p "$TMPDIR"
          export CARGO_BUILD_JOBS=4

          echo "=== 开始自举编译 ==="
          echo "当前时间: $(date)"

          python3 x.py build --stage 2

          echo "=== 自举编译完成 ==="
          echo "当前时间: $(date)"

      # ==================== 6. 验证产物 ====================
      - name: 验证编译产物
        run: |
          STAGE2_DIR="build/aarch64-apple-darwin/stage2"

          echo "=== 检查产物目录 ==="
          ls -la "$STAGE2_DIR/bin/" 2>/dev/null || echo "!!! bin 目录不存在"
          ls -la "$STAGE2_DIR/lib/" 2>/dev/null || echo "!!! lib 目录不存在"

          echo "=== rustc 文件类型 ==="
          file "$STAGE2_DIR/bin/rustc" 2>/dev/null || echo "!!! rustc 不存在"

          if [ ! -f "$STAGE2_DIR/bin/rustc" ]; then
            echo "FATAL: rustc 未生成"
            exit 1
          fi

          echo "=== 验证 iOS target 可用 ==="
          "$STAGE2_DIR/bin/rustc" --print target-list | grep aarch64-apple-ios

          echo "=== 产物大小 ==="
          du -sh "$STAGE2_DIR"

      # ==================== 7. 打包 ====================
      - name: 创建发行包
        run: |
          STAGE2_DIR="build/aarch64-apple-darwin/stage2"
          RUST_VERSION="${{ github.event.inputs.rust_version }}"
          BUILD_DATE=$(date +'%Y-%m-%d')

          if [ ! -d "$STAGE2_DIR/bin" ]; then
            echo "FATAL: $STAGE2_DIR/bin 不存在"
            exit 1
          fi

          mkdir -p release/bin release/lib
          cp -r "$STAGE2_DIR/bin/"* release/bin/
          cp -r "$STAGE2_DIR/lib/"* release/lib/

          cat > release/README.txt << NOTICE
          Rust 工具链 for iOS 交叉开发 — 预编译二进制发行版

          本工具链运行在 macOS ARM64 (Apple Silicon) 上，内置 aarch64-apple-ios target 支持，
          可直接交叉编译 iOS 程序。

          许可证：MIT + Apache License 2.0 双授权（与 Rust 官方一致）
          原始项目：https://github.com/rust-lang/rust
          版本：${RUST_VERSION}
          构建日期：${BUILD_DATE}
          构建环境：GitHub Actions macOS Runner (Apple Silicon)

          使用方法：
            1. 解压到任意目录
            2. 将 bin/ 加入 PATH
            3. cargo build --target aarch64-apple-ios
            4. 用 ldid 签名后部署到越狱 iOS 设备
          NOTICE

          tar -czf "rust-ios-toolchain-${RUST_VERSION}.tar.gz" -C release .
          echo "=== 打包完成 ==="
          ls -lh "rust-ios-toolchain-${RUST_VERSION}.tar.gz"

      # ==================== 8. 上传 Artifact ====================
      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-toolchain-${{ github.event.inputs.rust_version }}
          path: rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz
          retention-days: 7

      # ==================== 9. 发布 GitHub Release ====================
      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.rust_version }}-ios
          name: "Rust ${{ github.event.inputs.rust_version }} — iOS 交叉开发工具链"
          body: |
            ## Rust 工具链 for iOS 交叉开发

            ### 版本
            Rust &zwnj;**${{ github.event.inputs.rust_version }}**&zwnj; — 基于官方源码完整自举编译。

            ### 运行环境
            - macOS ARM64 (Apple Silicon)
            - macOS 10.12 及以上

            ### 内置 Target
            - `aarch64-apple-ios`

            ### 包含
            - `rustc` — Rust 编译器
            - `cargo` — 包管理器
            - `rustdoc` — 文档生成
            - `clippy` — 代码检查
            - 完整的标准库（含 iOS target）

            ### 使用方法
            ```bash
            # 1. 解压
            tar xzf rust-ios-toolchain-*.tar.gz -C /usr/local/

            # 2. 加入 PATH
            export PATH="/usr/local/rust-ios/bin:$PATH"

            # 3. 编译 iOS 程序
            cargo new hello --bin
            cd hello
            cargo build --target aarch64-apple-ios

            # 4. 签名并部署
            ldid -S target/aarch64-apple-ios/debug/hello
            scp target/aarch64-apple-ios/debug/hello root@iphone:/usr/local/bin/
            ```

            ### 许可
            MIT + Apache License 2.0 双授权。
            未修改源码，仅重新编译以包含 iOS target 支持。
            原始项目：https://github.com/rust-lang/rust
          files: rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
