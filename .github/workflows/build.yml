name: 自举编译 Rust for iOS（ARM64 宿主）

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: 'Rust 版本（如 1.85.0 或 stable）'
        required: true
        default: 'stable'

jobs:
  bootstrap:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ==================== 1. 环境准备 ====================
      - name: 修复 Xcode Command Line Tools
        run: |
          echo "=== 重新安装 Xcode CLT ==="
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          softwareupdate --list 2>/dev/null | grep "\*.*Command Line" | head -n1 | awk -F'*' '{print $2}' | sed 's/^ *//' | xargs -I{} softwareupdate -i "{}" 2>/dev/null || true
          xcode-select --install 2>/dev/null || true
          for i in $(seq 1 30); do
            if xcode-select -p &>/dev/null; then
              echo "CLT 就绪"
              break
            fi
            echo "等待 CLT 安装... ($i/30)"
            sleep 10
          done
          xcode-select -p
          echo "=== CLT 版本 ==="
          pkgutil --pkg-info=com.apple.pkg.CLTools_Executables 2>/dev/null || true

      - name: 安装全部构建依赖
        run: |
          echo "=== 安装 Homebrew 包 ==="
          brew install \
            cmake \
            ninja \
            ldid \
            lld \
            zstd \
            curl \
            openssl@3 \
            libffi \
            xz \
            2>/dev/null || true

          echo "=== 设置 pkg-config 路径 ==="
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

          echo "=== 验证 ld64.lld ==="
          which ld64.lld || echo "!!! ld64.lld 未找到"
          ld64.lld --version 2>&1 || true

          echo "=== 安装 Rustup ==="
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustc --version
          cargo --version

      # ==================== 2. 拉取 Rust 源码 ====================
      - name: 检出 Rust 官方源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}
          submodules: recursive
          fetch-depth: 1

      # ==================== 3. 环境诊断 ====================
      - name: 编译环境完整诊断
        run: |
          echo "=== Runner 架构 ==="
          uname -m
          echo "=== macOS 版本 ==="
          sw_vers
          echo "=== SDK 路径 ==="
          xcrun --show-sdk-path 2>/dev/null || echo "无 SDK"
          echo "=== cc 位置与版本 ==="
          which cc
          cc --version 2>&1 | head -n1
          echo "=== c++ 位置与版本 ==="
          which c++
          c++ --version 2>&1 | head -n1
          echo "=== ld 位置与版本 ==="
          which ld
          ld -v 2>&1 | head -n1 || true
          echo "=== ld64.lld 位置与版本 ==="
          which ld64.lld 2>/dev/null || echo "ld64.lld 未找到"
          ld64.lld --version 2>&1 || true
          echo "=== cmake ==="
          cmake --version 2>&1 | head -n1
          echo "=== ninja ==="
          ninja --version 2>&1
          echo "=== python3 ==="
          python3 --version 2>&1
          echo "=== Homebrew 路径 ==="
          brew --prefix
          echo "=== PATH ==="
          echo $PATH
          echo "=== PKG_CONFIG_PATH ==="
          echo $PKG_CONFIG_PATH
          echo "=== pkg-config 可用库 ==="
          pkg-config --list-all 2>/dev/null | grep -E "(ssl|crypto|libcurl|libz|zstd|ffi|lzma)" || true
          echo "=== 可用内存 ==="
          vm_stat | head -n5
          echo "=== 磁盘空间 ==="
          df -h / | tail -n1

      # ==================== 4. 配置构建参数 ====================
      - name: 创建 config.toml
        run: |
          cat > config.toml << 'EOF'
          [build]
          # Runner 是 Apple Silicon，直接用 aarch64 作为构建宿主
          build = "aarch64-apple-darwin"
          # 产生的工具链运行在 ARM64 iOS 上
          host = ["aarch64-apple-ios"]
          target = ["aarch64-apple-ios"]
          # 要构建的工具
          tools = ["cargo", "rustdoc", "clippy"]

          [rust]
          # 关闭增量编译以减少磁盘占用和潜在不兼容
          incremental = false
          # 不生成调试符号，加速编译
          debug = false
          # 不生成 debug-assertions，提升运行时性能
          debug-assertions = false
          # 优化级别设为 1，平衡构建时间和运行时性能
          optimize = true
          # 减少 codegen units 以降低内存峰值
          codegen-units = 1
          codegen-units-std = 1

          [target.aarch64-apple-ios]
          # iOS 目标使用 lld 链接器
          linker = "ld64.lld"

          [llvm]
          # 只针对 AArch64，跳过 x86/ARM32 等无用后端
          targets = "AArch64"
          # 不使用 CI 预编译的 LLVM
          download-ci-llvm = false
          # 链接并行数
          link-jobs = 4
          # 使用 ninja 加速 LLVM 构建
          ninja = true
          EOF

          echo "=== config.toml 内容 ==="
          cat config.toml

      # ==================== 5. 自举编译 ====================
      - name: 执行 Stage 2 自举编译
        run: |
          source $HOME/.cargo/env

          # 确保 Homebrew bin 在 PATH 最前面
          export PATH="/opt/homebrew/bin:$PATH"

          # 确保 OpenSSL 能被找到
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          export OPENSSL_ROOT_DIR="/opt/homebrew/opt/openssl@3"

          # 验证关键工具
          echo "=== 验证关键工具 ==="
          which ld64.lld && ld64.lld --version 2>&1 || { echo "FATAL: ld64.lld 不可用"; exit 1; }
          which cmake && cmake --version 2>&1 | head -n1
          which ninja && ninja --version 2>&1
          which cc && cc --version 2>&1 | head -n1

          # 把临时目录改到工作区，避免 SIP 干扰
          export TMPDIR="$GITHUB_WORKSPACE/tmp"
          mkdir -p "$TMPDIR"

          # 限制并行度，防止 OOM
          export CARGO_BUILD_JOBS=4

          echo "=== 开始自举编译 ==="
          echo "当前时间: $(date)"

          python3 x.py build --stage 2

          echo "=== 自举编译完成 ==="
          echo "当前时间: $(date)"

      # ==================== 6. 验证产物 ====================
      - name: 验证编译产物
        run: |
          STAGE2_DIR="build/aarch64-apple-ios/stage2"

          echo "=== 检查产物目录 ==="
          ls -la "$STAGE2_DIR/bin/" 2>/dev/null || echo "!!! bin 目录不存在"
          ls -la "$STAGE2_DIR/lib/" 2>/dev/null || echo "!!! lib 目录不存在"

          echo "=== rustc 文件类型 ==="
          file "$STAGE2_DIR/bin/rustc" 2>/dev/null || echo "!!! rustc 不存在"

          echo "=== 架构信息 ==="
          lipo -info "$STAGE2_DIR/bin/rustc" 2>/dev/null || echo "lipo 无法读取（可能是单架构）"

          if [ ! -f "$STAGE2_DIR/bin/rustc" ]; then
            echo "FATAL: rustc 未生成，构建失败"
            exit 1
          fi

          echo "=== 产物大小 ==="
          du -sh "$STAGE2_DIR"

      # ==================== 7. 签名 ====================
      - name: 对产物进行 ldid 签名
        run: |
          STAGE2_DIR="build/aarch64-apple-ios/stage2"

          echo "=== 签名二进制文件 ==="
          for bin in rustc cargo rustdoc clippy-driver; do
            if [ -f "$STAGE2_DIR/bin/$bin" ]; then
              echo "签名: $bin"
              ldid -S "$STAGE2_DIR/bin/$bin"
            else
              echo "跳过: $bin (不存在)"
            fi
          done

          echo "=== 签名动态库 ==="
          find "$STAGE2_DIR/lib" -name "*.dylib" 2>/dev/null | while read lib; do
            echo "签名库: $lib"
            ldid -S "$lib"
          done

      # ==================== 8. 打包 ====================
      - name: 创建合规发行包
        run: |
          STAGE2_DIR="build/aarch64-apple-ios/stage2"
          RUST_VERSION="${{ github.event.inputs.rust_version }}"
          BUILD_DATE=$(date +'%Y-%m-%d')

          if [ ! -d "$STAGE2_DIR/bin" ]; then
            echo "FATAL: $STAGE2_DIR/bin 不存在"
            exit 1
          fi

          mkdir -p release/bin release/lib
          cp -r "$STAGE2_DIR/bin/"* release/bin/
          cp -r "$STAGE2_DIR/lib/"* release/lib/

          cat > release/NOTICE.txt << NOTICE
          Rust iOS 原生工具链 — 预编译二进制发行版

          本发行版包含 Rust 编程语言的编译器及工具链。
          Rust 由 Rust 项目开发者以开源方式发布。

          许可证：
          Rust 编译器本身采用 Apache License 2.0 和 MIT 许可证双授权。
          完整许可文本请见：
            https://github.com/rust-lang/rust/blob/master/LICENSE-APACHE
            https://github.com/rust-lang/rust/blob/master/LICENSE-MIT

          修改说明：
          本发行版基于 Rust 官方源码编译，未对源代码进行任何实质性修改。
          仅为适配 iOS (aarch64-apple-ios) 宿主环境重新编译。

          原始项目：https://github.com/rust-lang/rust
          版本：${RUST_VERSION}
          构建日期：${BUILD_DATE}
          目标宿主机：aarch64-apple-ios
          构建环境：GitHub Actions macOS Runner (Apple Silicon)
          NOTICE

          tar -czf "rust-ios-toolchain-${RUST_VERSION}.tar.gz" -C release .
          echo "=== 打包完成 ==="
          ls -lh "rust-ios-toolchain-${RUST_VERSION}.tar.gz"

      # ==================== 9. 上传 Artifact ====================
      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-toolchain-${{ github.event.inputs.rust_version }}
          path: rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz
          retention-days: 7

      # ==================== 10. 发布 GitHub Release ====================
      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.rust_version }}-ios
          name: "Rust ${{ github.event.inputs.rust_version }} for 越狱 iOS"
          body: |
            ## Rust 原生工具链 for 越狱 iOS (aarch64-apple-ios)

            ### 版本
            Rust &zwnj;**${{ github.event.inputs.rust_version }}**&zwnj; — 基于官方源码完整自举编译。

            ### 构建信息
            - 构建宿主：aarch64-apple-darwin (Apple Silicon)
            - 目标宿主：aarch64-apple-ios
            - 构建日期：$(date +'%Y-%m-%d')

            ### 包含
            - `rustc` — Rust 编译器
            - `cargo` — 包管理器
            - `rustdoc` — 文档生成
            - `clippy` — 代码检查
            - 完整的标准库

            ### 使用方法
            1. 下载 `rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz`
            2. 解压到 iOS 设备的 `/usr/local/` 或个人目录
            3. 将 `bin/` 目录加入 `$PATH`
            4. 运行 `rustc --version` 验证

            ### 许可
            遵循 Rust 项目的 MIT + Apache 2.0 双许可证。
            未修改源码，仅为适配 `aarch64-apple-ios` 宿主重新编译。
            原始项目：https://github.com/rust-lang/rust
          files: rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
