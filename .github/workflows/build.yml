name: 自举编译Rust（iOS aarch64）

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: '要编译的Rust 版本（如 1.85.0）'
        required: true
        default: '1.85.0'

jobs:
  bootstrap:
    runs-on: macos-latest
    steps:
      - name: 检出Rust源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}

      - name: 安装macOS构建依赖
        run: |
          brew install cmake ninja ldid
          # 配置Rust工具链
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable

      - name: 创建config.toml（指向iOS宿主）
        run: |
          cat > config.toml << 'EOF'
          [build]
          # 在本机（x86_64 macOS）上运行构建工具
          build = "x86_64-apple-darwin"
          # 产出需要的工具链：ARM64 iOS能运行的rustc和cargo
          host = ["aarch64-apple-ios"]
          target = ["aarch64-apple-ios"]
          # 需要产出的工具
          tools = ["cargo", "rustdoc", "clippy"]

          [rust]
          # 关闭增量编译，确保链接不出兼容问题
          incremental = false
          # 优化编译速度
          debug = false
          # 使用 lld 作为链接器，避免依赖macOS特定版本的系统链接器
          lld = true

          [target.aarch64-apple-ios]
          # 指定链接器
          linker = "ld64.lld"

          [llvm]
          # 只编译ARM64后端，极大缩短LLVM构建时间（数小时 → 数十分钟）
          targets = "AArch64"
          EOF

- name: 诊断链接环境
  run: |
    echo "=== cc location ==="
    which cc
    cc --version
    echo "=== ld location ==="
    which ld
    ld -v 2>&1 || true
    echo "=== SDK path ==="
    xcrun --show-sdk-path
    echo "=== lld ==="
    which ld64.lld 2>/dev/null || echo "ld64.lld not found"

      - name: Stage 2自举编译
        run: |
          source $HOME/.cargo/env
          python3 x.py build --stage 2
        # 耗时：约60～120分钟（首次）

      - name: 签名产物
        run: |
          ldid -S build/aarch64-apple-ios/stage2/bin/rustc
          ldid -S build/aarch64-apple-ios/stage2/bin/cargo

      - name: 打包产物
        run: |
          mkdir -p release
          cp -r build/aarch64-apple-ios/stage2/bin release/
          cp -r build/aarch64-apple-ios/stage2/lib release/
          tar -czf rust-ios-bootstrap.tar.gz -C release .

      - name: 上传最终工具链
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-bootstrap
          path: rust-ios-bootstrap.tar.gz
