name: 自举编译 Rust for iOS 交叉开发

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: 'Rust 版本（如 stable 或 1.85.0）'
        required: true
        default: 'stable'

jobs:
  bootstrap:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # ==================== 1. 环境准备 ====================
      - name: 修复 Xcode Command Line Tools
        run: |
          echo "=== 重新安装 Xcode CLT ==="
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          softwareupdate --list 2>/dev/null | grep "\*.*Command Line" | head -n1 | awk -F'*' '{print $2}' | sed 's/^ *//' | xargs -I{} softwareupdate -i "{}" 2>/dev/null || true
          xcode-select --install 2>/dev/null || true
          for i in $(seq 1 30); do
            if xcode-select -p &>/dev/null; then
              echo "CLT 就绪"
              break
            fi
            echo "等待 CLT 安装... ($i/30)"
            sleep 10
          done
          xcode-select -p

      - name: 安装全部构建依赖
        run: |
          brew install cmake ninja ldid zstd curl openssl@3 libffi xz 2>/dev/null || true
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable

      # ==================== 2. 拉取 Rust 源码 ====================
      - name: 检出 Rust 官方源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}
          submodules: recursive
          fetch-depth: 1

      # ==================== 3. 环境诊断 ====================
      - name: 编译环境诊断
        run: |
          echo "=== 架构: $(uname -m) ==="
          echo "=== macOS: $(sw_vers -productVersion) ==="
          echo "=== SDK: $(xcrun --show-sdk-path 2>/dev/null || echo 无) ==="
          which cc && cc --version | head -n1
          which ld && ld -v | head -n1
          which cmake && cmake --version | head -n1
          which ninja && ninja --version
          echo "=== 磁盘: $(df -h / | tail -n1) ==="

      # ==================== 4. config.toml ====================
      - name: 创建 config.toml
        run: |
          cat > config.toml << 'EOF'
          [build]
          build = "aarch64-apple-darwin"
          host = ["aarch64-apple-darwin"]
          target = ["aarch64-apple-ios"]
          tools = ["cargo", "rustdoc", "clippy"]

          [rust]
          incremental = false
          debug = false
          debug-assertions = false
          optimize = true
          codegen-units = 1
          codegen-units-std = 1

          [llvm]
          targets = "AArch64"
          download-ci-llvm = false
          link-jobs = 4
          ninja = true
          EOF
          cat config.toml

      # ==================== 5. 自举编译 ====================
      - name: 执行 Stage 2 自举编译
        run: |
          source $HOME/.cargo/env
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          export OPENSSL_ROOT_DIR="/opt/homebrew/opt/openssl@3"
          export TMPDIR="$GITHUB_WORKSPACE/tmp"
          mkdir -p "$TMPDIR"
          export CARGO_BUILD_JOBS=4

          python3 x.py build --stage 2

      # ==================== 6. 打包（排除循环符号链接） ====================
      - name: 打包编译产物
        run: |
          STAGE2_DIR="build/aarch64-apple-darwin/stage2"
          RUST_VERSION="${{ github.event.inputs.rust_version }}"

          if [ ! -f "$STAGE2_DIR/bin/rustc" ]; then
            echo "FATAL: rustc 未生成"
            exit 1
          fi

          echo "=== 产物大小 ==="
          du -sh "$STAGE2_DIR"

          # 直接打包，排除会自循环的 rustc-src
          tar -czf "rust-ios-toolchain-${RUST_VERSION}.tar.gz" \
            -C "$STAGE2_DIR" \
            --exclude='lib/rustlib/rustc-src' \
            bin/ lib/

          echo "=== 打包完成 ==="
          ls -lh "rust-ios-toolchain-${RUST_VERSION}.tar.gz"

      # ==================== 7. 上传 Artifact ====================
      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-toolchain-${{ github.event.inputs.rust_version }}
          path: rust-ios-toolchain-${{ github.event.inputs.rust_version }}.tar.gz
          retention-days: 7
