name: 自举编译 Rust for iOS 交叉开发

on:
  workflow_dispatch:
    inputs:
      rust_version:
        description: 'Rust 版本（如 stable 或 1.85.0）'
        required: true
        default: 'stable'

jobs:
  bootstrap:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # 环境准备：修复 Xcode CLT
      - name: 修复 Xcode Command Line Tools
        run: |
          echo "=== 重新安装 Xcode CLT ==="
          sudo rm -rf /Library/Developer/CommandLineTools 2>/dev/null || true
          softwareupdate --list 2>/dev/null | grep "\*.*Command Line" | head -n1 | awk -F'*' '{print $2}' | sed 's/^ *//' | xargs -I{} softwareupdate -i "{}" 2>/dev/null || true
          xcode-select --install 2>/dev/null || true
          for i in $(seq 1 30); do
            if xcode-select -p &>/dev/null; then
              echo "CLT 就绪"
              break
            fi
            echo "等待 CLT 安装... ($i/30)"
            sleep 10
          done
          xcode-select -p

      # 环境准备：安装构建依赖
      - name: 安装全部构建依赖
        run: |
          brew install cmake ninja ldid zstd curl openssl@3 libffi xz 2>/dev/null || true
          export PKG_CONFIG_PATH="/opt/homebrew/opt/openssl@3/lib/pkgconfig:$PKG_CONFIG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >> $GITHUB_ENV

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable

      # 拉取 Rust 源码（fetch-depth: 0 避免 bootstrap 找不到父提交）
      - name: 检出 Rust 官方源码
        uses: actions/checkout@v4
        with:
          repository: rust-lang/rust
          ref: ${{ github.event.inputs.rust_version }}
          submodules: recursive
          fetch-depth: 0

      # 编译前环境诊断
      - name: 编译环境诊断
        run: |
          echo "架构: $(uname -m)"
          echo "macOS: $(sw_vers -productVersion)"
          echo "SDK: $(xcrun --show-sdk-path 2>/dev/null || echo 'N/A')"
          echo "Xcode: $(xcodebuild -version 2>/dev/null || echo 'N/A')"

      # 生成 entitlements 解决 iOS 秒杀问题
      - name: 生成 entitlements.plist
        run: |
          cat > ent.plist << 'ENT'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>get-task-allow</key>
              <true/>
              <key>dynamic-codesigning</key>
              <true/>
              <key>com.apple.private.skip-library-validation</key>
              <true/>
              <key>com.apple.private.security.no-container</key>
              <true/>
              <key>com.apple.private.amfi.allow-dyld-environment-variables</key>
              <true/>
              <key>com.apple.private.cs.debugger</key>
              <true/>
          </dict>
          </plist>
          ENT
          echo "entitlements.plist 内容:"
          cat ent.plist

      # 配置 iOS 交叉编译目标
      - name: 配置 iOS 编译目标
        run: |
          cat > config.toml << 'CFG'
          [build]
          target = ["aarch64-apple-ios"]
          tools = ["cargo", "rustc", "rustdoc", "clippy"]

          [target.aarch64-apple-ios]
          llvm-config = "/opt/homebrew/opt/llvm/bin/llvm-config"

          [dist]
          CFG
          echo "config.toml:"
          cat config.toml

      # 从源码编译 Rust 工具链
      - name: 编译 Rust for iOS
        run: |
          source $HOME/.cargo/env
          ./x build --stage 2
          ./x dist --stage 2

      # 核心步骤：为所有二进制注入 entitlements 并签名
      - name: 对产物进行 entitlements 签名
        run: |
          DIST_DIR="build/dist"

          echo "开始签名所有 Mach-O 二进制..."

          find "$DIST_DIR" -type f $ -perm +111 -o -name "*.dylib" -o -name "*.so" $ | while read -r binary; do
            if file "$binary" | grep -q "Mach-O.*arm64"; then
              echo "签名: $binary"

              xattr -d com.apple.quarantine "$binary" 2>/dev/null || true
              ldid -Sent.plist "$binary" 2>/dev/null || true
              codesign --force --sign - --entitlements ent.plist --timestamp=none "$binary" 2>/dev/null || true
            fi
          done

          for rustc_bin in $(find "$DIST_DIR" -name "rustc" -type f); do
            echo "重点签名 rustc: $rustc_bin"
            xattr -d com.apple.quarantine "$rustc_bin" 2>/dev/null || true
            ldid -Sent.plist "$rustc_bin"
            codesign --force --sign - --entitlements ent.plist --timestamp=none "$rustc_bin"

            echo "签名后验证:"
            codesign -dvvv "$rustc_bin" 2>&1 | head -10
          done

          echo "签名完成"

      # 最终校验产物完整性
      - name: 最终校验
        run: |
          DIST_DIR="build/dist"

          echo "产物列表:"
          ls -la "$DIST_DIR"/

          echo "检查 rustc 签名状态:"
          RUSTC_BIN=$(find "$DIST_DIR" -name "rustc" -type f | head -1)
          if [ -n "$RUSTC_BIN" ]; then
            file "$RUSTC_BIN"
            otool -L "$RUSTC_BIN" | head -10
            codesign -dvvv "$RUSTC_BIN" 2>&1
          fi

      # 打包并上传
      - name: 打包为 tar.gz
        run: |
          tar -czf rust-ios-toolchain.tar.gz -C build/dist .
          echo "产物: rust-ios-toolchain.tar.gz ($(du -sh rust-ios-toolchain.tar.gz | cut -f1))"

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-ios-toolchain
          path: rust-ios-toolchain.tar.gz
          retention-days: 7
